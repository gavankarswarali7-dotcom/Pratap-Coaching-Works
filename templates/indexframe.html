<html>    
<head>    
    <title>Frameset Example</title>    
</head>    
<frameset rows="15%,*,10%">    
    <frame src="header.html" name="headerFrame">    
        
    <frameset cols="25%,*">    
        <frame src="left.html" name="leftFrame">    
        <frame src="right.html" name="rightFrame">    
    </frameset>    
        
    <frame src="status.html" name="statusFrame">    
</frameset>    
</html>
